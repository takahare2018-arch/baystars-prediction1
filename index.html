<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ベイスターズ リアルタイム予想アプリ</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .baystars-blue { background-color: #0055A5; }
        .baystars-text { color: #0055A5; }
        select { text-align-last: center; }
        .score-input {
            width: 100%;
            min-width: 28px;
            height: 32px;
            text-align: center;
            background-color: transparent;
            font-weight: bold;
            font-size: 16px;
            outline: none;
        }
        .score-input:focus { background-color: #e0f2fe; border-radius: 4px; }
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        /* BSOのタップ時のチラつき防止 */
        .bso-row { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen pb-10">

    <header class="baystars-blue text-white p-4 text-center font-bold text-xl shadow-md">
        🌟 DeNA 勝敗予想シミュレーター
    </header>

    <div class="max-w-md mx-auto p-4 space-y-4">
        
        <div class="bg-white p-4 rounded-xl shadow-sm space-y-4">
            <div class="flex justify-between items-center border-b pb-2">
                <h2 class="font-bold text-lg text-gray-700">📋 試合状況</h2>
                <button id="resetBtn" class="text-xs bg-gray-200 px-3 py-1 rounded text-gray-700 hover:bg-gray-300 font-bold">リセット</button>
            </div>

            <div>
                <select id="homeVisitor" class="w-full border-2 border-blue-200 rounded-lg p-2 bg-white font-bold text-blue-800">
                    <option value="home">🏠 ホーム (DeNA後攻)</option>
                    <option value="visitor">✈️ ビジター (DeNA先攻)</option>
                </select>
            </div>

            <div class="overflow-x-auto pb-2">
                <table class="text-sm border-collapse min-w-max w-full table-fixed">
                    <thead>
                        <tr class="bg-gray-100 text-gray-600 text-xs">
                            <th class="p-1 border w-14">チーム</th>
                            <th class="p-1 border w-8">1</th><th class="p-1 border w-8">2</th><th class="p-1 border w-8">3</th>
                            <th class="p-1 border w-8">4</th><th class="p-1 border w-8">5</th><th class="p-1 border w-8">6</th>
                            <th class="p-1 border w-8">7</th><th class="p-1 border w-8">8</th><th class="p-1 border w-8">9</th>
                            <th class="p-1 border font-bold text-red-500 w-10">R</th>
                        </tr>
                    </thead>
                    <tbody id="scoreboardBody">
                        </tbody>
                </table>
                <p class="text-[10px] text-gray-400 mt-1 text-right">※枠をタップして点数を直接入力できます</p>
            </div>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-sm space-y-4">
            <h2 class="font-bold text-lg border-b pb-2 text-gray-700">⚾ カウント・ランナー</h2>
            
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs text-gray-500 font-bold mb-1">イニング</label>
                    <select id="inning" class="w-full border rounded p-2 bg-gray-50 font-bold">
                        <option value="1">1回</option><option value="2">2回</option><option value="3">3回</option>
                        <option value="4">4回</option><option value="5">5回</option><option value="6">6回</option>
                        <option value="7">7回</option><option value="8">8回</option><option value="9">9回</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs text-gray-500 font-bold mb-1">表/裏</label>
                    <select id="topBottom" class="w-full border rounded p-2 bg-gray-50 font-bold">
                        <option value="top">表</option>
                        <option value="bottom">裏</option>
                    </select>
                </div>
            </div>

            <div class="bg-gray-900 p-4 rounded-xl text-white shadow-inner flex flex-col gap-3">
                <p class="text-[10px] text-gray-400 text-center -mt-1 mb-1">※行をタップしてカウントアップ</p>
                
                <div class="flex items-center gap-3 cursor-pointer bso-row select-none justify-center" onclick="incrementBSO('B')">
                    <span class="text-green-400 font-bold text-xl w-6 text-right">B</span>
                    <div class="w-6 h-6 rounded-full border-2 border-green-500 transition-colors" id="b1"></div>
                    <div class="w-6 h-6 rounded-full border-2 border-green-500 transition-colors" id="b2"></div>
                    <div class="w-6 h-6 rounded-full border-2 border-green-500 transition-colors" id="b3"></div>
                </div>
                <div class="flex items-center gap-3 cursor-pointer bso-row select-none justify-center" onclick="incrementBSO('S')">
                    <span class="text-yellow-400 font-bold text-xl w-6 text-right">S</span>
                    <div class="w-6 h-6 rounded-full border-2 border-yellow-400 transition-colors" id="s1"></div>
                    <div class="w-6 h-6 rounded-full border-2 border-yellow-400 transition-colors" id="s2"></div>
                    <div class="w-6 h-6 opacity-0"></div>
                </div>
                <div class="flex items-center gap-3 cursor-pointer bso-row select-none justify-center" onclick="incrementBSO('O')">
                    <span class="text-red-500 font-bold text-xl w-6 text-right">O</span>
                    <div class="w-6 h-6 rounded-full border-2 border-red-500 transition-colors" id="o1"></div>
                    <div class="w-6 h-6 rounded-full border-2 border-red-500 transition-colors" id="o2"></div>
                    <div class="w-6 h-6 opacity-0"></div>
                </div>
            </div>

            <input type="hidden" id="balls" value="0">
            <input type="hidden" id="strikes" value="0">
            <input type="hidden" id="outs" value="0">

            <div>
                <label class="block text-xs text-gray-500 font-bold mb-1">ランナー</label>
                <select id="runners" class="w-full border rounded p-2 bg-gray-50 font-bold text-green-700">
                    <option value="0">なし</option>
                    <option value="1">1塁</option>
                    <option value="2">得点圏 (2塁/3塁)</option>
                    <option value="3">満塁</option>
                </select>
            </div>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-sm text-center">
            <h2 class="font-bold text-lg border-b pb-2 baystars-text mb-4">📊 リアルタイム予想</h2>
            <div class="flex justify-center items-end gap-3 mb-2">
                <div class="text-2xl font-black text-blue-700" id="totalDena">DeNA 0</div>
                <div class="text-gray-400 font-bold">-</div>
                <div class="text-2xl font-black text-gray-700" id="totalOpp">相手 0</div>
            </div>
            
            <div class="text-3xl font-black baystars-text mb-4">
                勝率: <span id="winRateDisplay">50</span>%
            </div>
            
            <div class="w-48 h-48 mx-auto">
                <canvas id="predictionChart"></canvas>
            </div>
        </div>

    </div>

    <script>
        let denaInnings = ["","","","","","","","",""];
        let oppInnings = ["","","","","","","","",""];
        let denaTotalScore = 0;
        let oppTotalScore = 0;

        const ctx = document.getElementById('predictionChart').getContext('2d');
        let predictionChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['DeNA勝利', '相手の勝利/引き分け'],
                datasets: [{ data: [50, 50], backgroundColor: ['#0055A5', '#CBD5E1'], borderWidth: 0 }]
            },
            options: { responsive: true, plugins: { legend: { display: false }, tooltip: { enabled: false } } }
        });

        function renderScoreboard() {
            const homeVisitor = document.getElementById('homeVisitor').value;
            const tbody = document.getElementById('scoreboardBody');
            tbody.innerHTML = ''; 

            const createRow = (teamName, inningsData, isDeNA) => {
                let row = `<tr class="${isDeNA ? 'bg-blue-50 text-blue-800 font-bold' : 'bg-white text-gray-700'}">`;
                row += `<td class="p-1 border text-center text-xs">${teamName}</td>`;
                
                for (let i = 0; i < 9; i++) {
                    row += `<td class="p-0 border text-center">
                                <input type="number" inputmode="numeric" class="score-input" 
                                data-team="${isDeNA ? 'dena' : 'opp'}" data-inning="${i}" value="${inningsData[i]}">
                            </td>`;
                }
                
                const total = inningsData.reduce((sum, val) => sum + (parseInt(val) || 0), 0);
                if (isDeNA) denaTotalScore = total; else oppTotalScore = total;
                
                row += `<td class="p-1 border text-center font-black text-base bg-gray-100">${total}</td></tr>`;
                return row;
            };

            if (homeVisitor === 'home') {
                tbody.innerHTML += createRow('相手', oppInnings, false);
                tbody.innerHTML += createRow('DeNA', denaInnings, true);
            } else {
                tbody.innerHTML += createRow('DeNA', denaInnings, true);
                tbody.innerHTML += createRow('相手', oppInnings, false);
            }

            document.querySelectorAll('.score-input').forEach(input => {
                input.addEventListener('input', (e) => {
                    const team = e.target.dataset.team;
                    const innIdx = parseInt(e.target.dataset.inning);
                    const val = e.target.value;
                    
                    if (team === 'dena') denaInnings[innIdx] = val;
                    else oppInnings[innIdx] = val;
                    
                    renderScoreboard(); 
                    calculateAndSave(); 
                });
            });

            document.getElementById('totalDena').innerText = `DeNA ${denaTotalScore}`;
            document.getElementById('totalOpp').innerText = `相手 ${oppTotalScore}`;
        }

        function incrementBSO(type) {
            if (type === 'B') {
                let b = parseInt(document.getElementById('balls').value);
                document.getElementById('balls').value = (b + 1) % 4; 
            } else if (type === 'S') {
                let s = parseInt(document.getElementById('strikes').value);
                document.getElementById('strikes').value = (s + 1) % 3; 
            } else if (type === 'O') {
                let o = parseInt(document.getElementById('outs').value);
                document.getElementById('outs').value = (o + 1) % 3; 
            }
            updateBSOUI();
            calculateAndSave();
        }

        function updateBSOUI() {
            const b = parseInt(document.getElementById('balls').value);
            const s = parseInt(document.getElementById('strikes').value);
            const o = parseInt(document.getElementById('outs').value);

            document.getElementById('b1').className = `w-6 h-6 rounded-full border-2 border-green-500 transition-colors ${b >= 1 ? 'bg-green-500' : ''}`;
            document.getElementById('b2').className = `w-6 h-6 rounded-full border-2 border-green-500 transition-colors ${b >= 2 ? 'bg-green-500' : ''}`;
            document.getElementById('b3').className = `w-6 h-6 rounded-full border-2 border-green-500 transition-colors ${b >= 3 ? 'bg-green-500' : ''}`;

            document.getElementById('s1').className = `w-6 h-6 rounded-full border-2 border-yellow-400 transition-colors ${s >= 1 ? 'bg-yellow-400' : ''}`;
            document.getElementById('s2').className = `w-6 h-6 rounded-full border-2 border-yellow-400 transition-colors ${s >= 2 ? 'bg-yellow-400' : ''}`;

            document.getElementById('o1').className = `w-6 h-6 rounded-full border-2 border-red-500 transition-colors ${o >= 1 ? 'bg-red-500' : ''}`;
            document.getElementById('o2').className = `w-6 h-6 rounded-full border-2 border-red-500 transition-colors ${o >= 2 ? 'bg-red-500' : ''}`;
        }

        function calculateAndSave() {
            const homeVisitor = document.getElementById('homeVisitor').value;
            const inning = parseInt(document.getElementById('inning').value);
            const topBottom = document.getElementById('topBottom').value;
            const balls = parseInt(document.getElementById('balls').value);
            const strikes = parseInt(document.getElementById('strikes').value);
            const outs = parseInt(document.getElementById('outs').value);
            const runners = parseInt(document.getElementById('runners').value);

            const topOption = document.querySelector('#topBottom option[value="top"]');
            const bottomOption = document.querySelector('#topBottom option[value="bottom"]');
            if (homeVisitor === 'home') {
                topOption.text = "表 (相手攻撃)";
                bottomOption.text = "裏 (DeNA攻撃)";
            } else {
                topOption.text = "表 (DeNA攻撃)";
                bottomOption.text = "裏 (相手攻撃)";
            }

            const gameData = { homeVisitor, denaInnings, oppInnings, inning, topBottom, balls, strikes, outs, runners };
            localStorage.setItem('baystarsGameData', JSON.stringify(gameData));

            let baseRate = 50;
            const scoreDiff = denaTotalScore - oppTotalScore;
            baseRate += scoreDiff * (10 + inning * 2);

            let isDeNA_Batting = (homeVisitor === 'home' && topBottom === 'bottom') || (homeVisitor === 'visitor' && topBottom === 'top');
            let situationAdvantage = 0;

            if (isDeNA_Batting) {
                if (runners === 1) situationAdvantage += 3;
                if (runners === 2) situationAdvantage += 6;
                if (runners === 3) situationAdvantage += 10;
                if (outs === 0) situationAdvantage += 2;
                if (outs === 2) situationAdvantage -= 4;
                situationAdvantage += balls * 0.5;
                situationAdvantage -= strikes * 0.5;
            } else {
                if (runners === 1) situationAdvantage -= 3;
                if (runners === 2) situationAdvantage -= 6;
                if (runners === 3) situationAdvantage -= 10;
                if (outs === 0) situationAdvantage -= 2;
                if (outs === 2) situationAdvantage += 4;
                situationAdvantage -= balls * 0.5;
                situationAdvantage += strikes * 0.5;
            }

            const inningFactor = 1 + (inning / 5); 
            baseRate += situationAdvantage * inningFactor;
            let finalRate = Math.min(Math.max(Math.round(baseRate), 1), 99);

            document.getElementById('winRateDisplay').innerText = finalRate;
            predictionChart.data.datasets[0].data = [finalRate, 100 - finalRate];
            predictionChart.update();
        }

        function loadSavedData() {
            const savedData = localStorage.getItem('baystarsGameData');
            if (savedData) {
                const data = JSON.parse(savedData);
                document.getElementById('homeVisitor').value = data.homeVisitor || 'home';
                denaInnings = data.denaInnings || ["","","","","","","","",""];
                oppInnings = data.oppInnings || ["","","","","","","","",""];
                document.getElementById('inning').value = data.inning || 1;
                document.getElementById('topBottom').value = data.topBottom || 'top';
                document.getElementById('balls').value = data.balls || 0;
                document.getElementById('strikes').value = data.strikes || 0;
                document.getElementById('outs').value = data.outs || 0;
                document.getElementById('runners').value = data.runners || 0;
            }
            renderScoreboard();
            updateBSOUI(); 
            calculateAndSave();
        }

        document.querySelectorAll('select').forEach(el => {
            el.addEventListener('change', () => {
                if (el.id === 'homeVisitor') renderScoreboard(); 
                calculateAndSave();
            });
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            if(confirm("すべての状況とスコアボードを初期化しますか？")) {
                document.getElementById('homeVisitor').value = 'home';
                denaInnings = ["","","","","","","","",""];
                oppInnings = ["","","","","","","","",""];
                document.getElementById('inning').value = 1;
                document.getElementById('topBottom').value = 'top';
                document.getElementById('balls').value = 0;
                document.getElementById('strikes').value = 0;
                document.getElementById('outs').value = 0;
                document.getElementById('runners').value = 0;
                renderScoreboard();
                updateBSOUI(); 
                calculateAndSave();
            }
        });

        loadSavedData();
    </script>
</body>
</html>
