<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ベイスターズ リアルタイム予想アプリ</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .baystars-blue { background-color: #0055A5; }
        .baystars-text { color: #0055A5; }
        select { text-align-last: center; }
        .score-input {
            width: 100%;
            min-width: 28px;
            height: 32px;
            text-align: center;
            background-color: transparent;
            font-weight: bold;
            font-size: 16px;
            outline: none;
        }
        .score-input:focus { background-color: #e0f2fe; border-radius: 4px; }
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        /* BSOのタップ時のチラつき防止 */
        .bso-row { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen pb-10">

    <header class="baystars-blue text-white p-4 text-center font-bold text-xl shadow-md">
        🌟 DeNA 勝敗予想シミュレーター
    </header>

    <div class="max-w-md mx-auto p-4 space-y-4">
        
        <div class="bg-white p-4 rounded-xl shadow-sm space-y-4">
            <div class="flex justify-between items-center border-b pb-2">
                <h2 class="font-bold text-lg text-gray-700">📋 試合状況</h2>
                <button id="resetBtn" class="text-xs bg-gray-200 px-3 py-1 rounded text-gray-700 hover:bg-gray-300 font-bold">リセット</button>
            </div>

            <div>
                <select id="homeVisitor" class="w-full border-2 border-blue-200 rounded-lg p-2 bg-white font-bold text-blue-800">
                    <option value="home">🏠 ホーム (DeNA後攻)</option>
                    <option value="visitor">✈️ ビジター (DeNA先攻)</option>
                </select>
            </div>

            <div class="overflow-x-auto pb-2">
                <table class="text-sm border-collapse min-w-max w-full table-fixed">
                    <thead>
                        <tr class="bg-gray-100 text-gray-600 text-xs">
                            <th class="p-1 border w-14">チーム</th>
                            <th class="p-1 border w-8">1</th><th class="p-1 border w-8">2</th><th class="p-1 border w-8">3</th>
                            <th class="p-1 border w-8">4</th><th class="p-1 border w-8">5</th><th class="p-1 border w-8">6</th>
                            <th class="p-1 border w-8">7</th><th class="p-1 border w-8">8</th><th class="p-1 border w-8">9</th>
                            <th class="p-1 border font-bold text-red-500 w-10">R</th>
                        </tr>
                    </thead>
                    <tbody id="scoreboardBody">
                        </tbody>
                </table>
                <p class="text-[10px] text-gray-400 mt-1 text-right">※枠をタップして点数を直接入力できます</p>
            </div>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-sm space-y-4">
            <h2 class="font-bold text-lg border-b pb-2 text-gray-700">⚾ カウント・ランナー</h2>
            
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs text-gray-500 font-bold mb-1">イニング</label>
                    <select id="inning" class="w-full border rounded p-2 bg-gray-50 font-bold">
                        <option value="1">1回</option><option value="2">2回</option><option value="3">3回</option>
                        <option value="4">4回</option><option value="5">5回</option><option value="6">6回</option>
                        <option value="7">7回</option><option value="8">8回</option><option value="9">9回</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs text-gray-500 font-bold mb-1">表/裏</label>
                    <select id="topBottom" class="w-full border rounded p-2 bg-gray-50 font-bold">
                        <option value="top">表</option>
                        <option value="bottom">裏</option>
                    </select>
                </div>
            </div>

            <div class="bg-gray-900 p-4 rounded-xl text-white shadow-inner flex flex-col gap-3">
                <p class="text-[10px] text-gray-400 text-center -mt-1 mb-1">※行をタップしてカウントアップ</p>
                
                <div class="flex items-center gap-3 cursor-pointer bso-row select-none justify-center" onclick="incrementBSO('B')">
                    <span class="text-green-400 font-bold text-xl w-6 text-right">B</span>
                    <div class="w-6 h-6 rounded-full border-2 border-green-500 transition-colors" id="b1"></div>
                    <div class="w-6 h-6 rounded-full border-2 border-green-500 transition-colors" id="b2"></div>
                    <div class="w-6 h-6 rounded-full border-2 border-green-500 transition-colors" id="b3"></div>
                </div>
                <div class="flex items-center gap-3 cursor-pointer bso-row select-none justify-center" onclick="incrementBSO('S')">
                    <span class="text-yellow-400 font-bold text-xl w-6 text-right">S</span>
                    <div class="w-6 h-6 rounded-full border-2 border-yellow-400 transition-colors" id="s1"></div>
                    <div class="w-6 h-6 rounded-full border-2 border-yellow-400 transition-colors" id="s2"></div>
                    <div class="w-6 h-6 opacity-0"></div> </div>
                <div class="flex items-center gap-3 cursor-pointer bso-row select-none justify-center" onclick="incrementBSO('O')">
                    <span class="text-red-500 font-bold text-xl w-6 text-right">O</span>
                    <div class="w-6 h-6 rounded-full border-2 border-red-500 transition-colors" id="o1"></div>
                    <div class="w-6 h-6 rounded-full border-2 border-red-500 transition-colors" id="o2"></div>
                    <div class="w-6 h-6 opacity-0"></div>
                </div>
            </div>

            <input type="hidden" id="balls" value="0">
            <input type="hidden" id="strikes" value="0">
            <input type="hidden" id="outs" value="0">

            <div>
